<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TicTac · Classic, Ultimate & Memory</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;
    --border:#2a2a3e;--border2:#3a3a5e;
    --text:#e8e8f0;--text2:#9090b0;
    --x-color:#ff4d6d;--x-glow:rgba(255,77,109,0.3);
    --o-color:#4d94ff;--o-glow:rgba(77,148,255,0.3);
    --accent:#a78bfa;--accent-glow:rgba(167,139,250,0.25);
    --win:#ffd700;--win-glow:rgba(255,215,0,0.3);
    --mem:#34d399;--mem-glow:rgba(52,211,153,0.25);
    --radius:12px;--radius2:8px;
    --shadow:0 20px 60px rgba(0,0,0,0.5);
    --tr:0.2s cubic-bezier(0.4,0,0.2,1);
  }
  .light {
    --bg:#f0f0f7;--bg2:#e4e4ef;--bg3:#d8d8ea;
    --border:#c0c0d8;--border2:#a0a0c0;
    --text:#111120;--text2:#404060;
    --x-color:#d42050;--x-glow:rgba(212,32,80,0.15);
    --o-color:#1a5cd4;--o-glow:rgba(26,92,212,0.15);
    --accent:#7c3aed;--accent-glow:rgba(124,58,237,0.15);
    --shadow:0 20px 60px rgba(0,0,0,0.15);
    --mem:#059669;--mem-glow:rgba(5,150,105,0.15);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:.3;pointer-events:none}
  #app{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:16px}

  header{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:16px 0 24px}
  .logo{font-size:1.6rem;font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,var(--x-color),var(--accent),var(--o-color));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .header-actions{display:flex;gap:10px}
  .icon-btn{width:40px;height:40px;border-radius:var(--radius2);border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;transition:var(--tr)}
  .icon-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2);transform:scale(1.05)}

  .screen{width:100%;max-width:700px;animation:fsIn .35s ease}
  @keyframes fsIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

  /* ── MENU ── */
  .menu-title{text-align:center;margin-bottom:8px}
  .menu-title h1{font-size:clamp(2rem,6vw,3.2rem);font-weight:800;letter-spacing:-2px;line-height:1}
  .menu-title p{color:var(--text2);font-size:.9rem;margin-top:8px;font-family:'JetBrains Mono',monospace}
  .section-label{font-family:'JetBrains Mono',monospace;font-size:.7rem;font-weight:700;letter-spacing:2px;color:var(--text2);text-transform:uppercase;margin:24px 0 10px}
  .mode-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .player-mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .mode-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 12px;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden}
  .mode-card::before{content:'';position:absolute;inset:0;background:var(--cg,transparent);opacity:0;transition:opacity .3s}
  .mode-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
  .mode-card:hover::before{opacity:1}
  .mode-card.selected{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-glow),0 8px 30px rgba(0,0,0,.3)}
  .mode-card .icon{font-size:1.7rem;margin-bottom:7px}
  .mode-card h3{font-size:.9rem;font-weight:700;margin-bottom:3px}
  .mode-card p{font-size:.72rem;color:var(--text2);line-height:1.4}
  .classic-card{--cg:linear-gradient(135deg,var(--x-glow),transparent)}
  .ultimate-card{--cg:linear-gradient(135deg,var(--o-glow),transparent)}
  .memory-card{--cg:linear-gradient(135deg,var(--mem-glow),transparent)}
  .single-card{--cg:linear-gradient(135deg,var(--accent-glow),transparent)}
  .two-card{--cg:linear-gradient(135deg,rgba(255,215,0,.1),transparent)}

  .diff-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
  .diff-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius2);padding:12px 8px;text-align:center;cursor:pointer;transition:var(--tr)}
  .diff-card:hover{border-color:var(--border2);background:var(--bg3)}
  .diff-card.sel-easy{border-color:#4ade80;box-shadow:0 0 0 2px rgba(74,222,128,.2)}
  .diff-card.sel-medium{border-color:#fbbf24;box-shadow:0 0 0 2px rgba(251,191,36,.2)}
  .diff-card.sel-hard{border-color:#f87171;box-shadow:0 0 0 2px rgba(248,113,113,.2)}
  .diff-card .di{font-size:1.3rem;margin-bottom:4px}
  .diff-card h4{font-size:.8rem;font-weight:700}
  .diff-card p{font-size:.68rem;color:var(--text2);margin-top:2px}

  .name-inputs{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .ig label{display:block;font-size:.72rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text2);margin-bottom:6px;font-family:'JetBrains Mono',monospace}
  .ig input{width:100%;padding:10px 12px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius2);color:var(--text);font-family:'Syne',sans-serif;font-size:.9rem;transition:var(--tr);outline:none}
  .ig input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
  .start-btn{width:100%;padding:15px;background:linear-gradient(135deg,var(--x-color),var(--accent));border:none;border-radius:var(--radius);color:#fff;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;margin-top:24px;transition:var(--tr);box-shadow:0 4px 20px rgba(167,139,250,.3)}
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(167,139,250,.4)}

  /* ── GAME HEADER ── */
  .game-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
  .back-btn,.restart-btn{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:8px 12px;color:var(--text2);cursor:pointer;font-family:'Syne',sans-serif;font-size:.8rem;font-weight:600;transition:var(--tr)}
  .back-btn:hover,.restart-btn:hover{background:var(--bg3);color:var(--text)}
  .game-title{font-size:.85rem;font-weight:700;color:var(--text2);font-family:'JetBrains Mono',monospace;text-align:center}

  /* ── SCORE BAR ── */
  .score-bar{display:flex;align-items:stretch;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:14px}
  .ps{flex:1;padding:10px 12px;border-radius:var(--radius2);transition:var(--tr)}
  .ps.ax{background:var(--bg3);box-shadow:inset 3px 0 0 var(--x-color)}
  .ps.ao{background:var(--bg3);box-shadow:inset 3px 0 0 var(--o-color)}
  .ps .pn{font-size:.72rem;color:var(--text2);font-family:'JetBrains Mono',monospace;text-transform:uppercase;letter-spacing:1px}
  .ps .pp{font-size:1.6rem;font-weight:800;line-height:1}
  .ps.xs .pp{color:var(--x-color)}.ps.os .pp{color:var(--o-color)}
  .ps .pw{font-size:.68rem;color:var(--text2);margin-top:2px}
  .sdiv{width:1px;background:var(--border)}
  .smid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 12px;gap:2px}
  .smid .sc{font-size:1.3rem;font-weight:800;font-family:'JetBrains Mono',monospace}
  .smid .sl{font-size:.65rem;color:var(--text2);letter-spacing:1px;text-transform:uppercase;font-family:'JetBrains Mono',monospace}

  /* ── STATUS ── */
  .status{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 14px;font-size:.88rem;font-weight:600;text-align:center;margin-bottom:14px;transition:all .3s;font-family:'JetBrains Mono',monospace;min-height:42px;display:flex;align-items:center;justify-content:center;gap:6px}
  .status.thinking{animation:pulse 1s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .status.win{border-color:var(--win);background:rgba(255,215,0,.08);color:var(--win)}
  .status.draw{border-color:var(--accent);background:var(--accent-glow);color:var(--accent)}

  /* ── CLASSIC BOARD ── */
  .classic-board{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:360px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
  .cell{aspect-ratio:1;border-radius:var(--radius2);background:var(--bg3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:800;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden;user-select:none}
  .cell:hover:not(.taken):not(.dis){background:var(--bg2);border-color:var(--border2);transform:scale(1.03)}
  .cell.taken{cursor:default}
  .cell.cx{color:var(--x-color);text-shadow:0 0 20px var(--x-glow)}
  .cell.co{color:var(--o-color);text-shadow:0 0 20px var(--o-glow)}
  .cell.cw{background:rgba(255,215,0,.08);border-color:var(--win);box-shadow:inset 0 0 12px var(--win-glow)}
  .cell.cdead{opacity:.35}
  .cell.pop{animation:cp .3s cubic-bezier(.34,1.56,.64,1)}
  @keyframes cp{0%{transform:scale(.5)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
  .cell.dis{opacity:.4;cursor:not-allowed}

  /* ── ULTIMATE ── */
  .ult-wrap{width:100%;max-width:640px;margin:0 auto}
  .ult-board{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:10px;box-shadow:var(--shadow)}
  .mini-board{background:var(--bg3);border-radius:var(--radius2);border:2px solid var(--border);padding:4px;position:relative;transition:var(--tr);overflow:hidden}
  .mini-board.wx{border-color:var(--x-color);background:rgba(255,77,109,.05)}
  .mini-board.wo{border-color:var(--o-color);background:rgba(77,148,255,.05)}
  .mini-board.wd{opacity:.6}
  .mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
  .mc{aspect-ratio:1;border-radius:4px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:clamp(.7rem,2.2vw,1rem);font-weight:800;cursor:pointer;transition:var(--tr);user-select:none}
  .mc:hover:not(.taken):not(.dis){background:var(--bg3);border-color:var(--border2);transform:scale(1.05)}
  .mc.taken{cursor:default}
  .mc.cx{color:var(--x-color)}.mc.co{color:var(--o-color)}
  .mc.cw{background:rgba(255,215,0,.08);border-color:rgba(255,215,0,.4)}
  .mc.pop{animation:cp .25s cubic-bezier(.34,1.56,.64,1)}
  .mc.dis{cursor:not-allowed}
  .bwo{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:900;border-radius:var(--radius2);z-index:2;backdrop-filter:blur(2px)}
  .bwo.bx{color:var(--x-color);text-shadow:0 0 30px var(--x-glow);background:rgba(255,77,109,.08)}
  .bwo.bo{color:var(--o-color);text-shadow:0 0 30px var(--o-glow);background:rgba(77,148,255,.08)}
  .bwo.bd{color:var(--text2);font-size:1.2rem;background:rgba(0,0,0,.3)}

  /* ── MEMORY ── */
  .mem-board{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:360px;margin:0 auto;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px;box-shadow:var(--shadow)}
  .mcell{aspect-ratio:1;border-radius:var(--radius2);background:var(--bg3);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:clamp(1.8rem,6vw,2.8rem);font-weight:800;cursor:pointer;transition:var(--tr);position:relative;overflow:hidden;user-select:none}
  .mcell:hover:not(.taken):not(.dis){background:var(--bg2);border-color:var(--border2);transform:scale(1.03)}
  .mcell.taken{cursor:default}
  .mcell.cx{color:var(--x-color);text-shadow:0 0 20px var(--x-glow)}
  .mcell.co{color:var(--o-color);text-shadow:0 0 20px var(--o-glow)}
  .mcell.cw{background:rgba(255,215,0,.08);border-color:var(--win);box-shadow:inset 0 0 12px var(--win-glow)}
  .mcell.pop{animation:cp .3s cubic-bezier(.34,1.56,.64,1)}
  .mcell.dis{opacity:.4;cursor:not-allowed}
  .mcell.fading{animation:mfade .65s ease forwards}
  @keyframes mfade{0%{opacity:1;transform:scale(1)}40%{opacity:.5;transform:scale(.85)}100%{opacity:0;transform:scale(.6)}}
  .mcell.ghost::after{content:'';position:absolute;inset:5px;border:2px dashed currentColor;border-radius:6px;opacity:.45;animation:gp 1.1s ease-in-out infinite}
  @keyframes gp{0%,100%{opacity:.45}50%{opacity:.1}}

  .mem-info{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:10px 14px;margin-bottom:10px;font-size:.75rem;color:var(--text2);font-family:'JetBrains Mono',monospace;display:flex;gap:14px;flex-wrap:wrap;justify-content:center;align-items:center}
  .mem-info .dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
  .mem-info .xd{background:var(--x-color)}.mem-info .od{background:var(--o-color)}
  .mem-warn{background:rgba(255,215,0,.07);border:1px solid var(--win);border-radius:var(--radius2);padding:8px 12px;margin-bottom:10px;font-size:.75rem;color:var(--win);text-align:center;font-family:'JetBrains Mono',monospace}

  /* ── GAME OVER ── */
  .go-ov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);padding:20px;animation:fi .3s ease}
  @keyframes fi{from{opacity:0}to{opacity:1}}
  .go-card{background:var(--bg2);border:1.5px solid var(--border2);border-radius:20px;padding:36px 28px;text-align:center;max-width:360px;width:100%;box-shadow:0 40px 80px rgba(0,0,0,.6);animation:si .4s cubic-bezier(.34,1.56,.64,1)}
  @keyframes si{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
  .go-icon{font-size:4rem;margin-bottom:12px;display:block}
  .go-res{font-size:1.8rem;font-weight:800;margin-bottom:8px}
  .go-sub{color:var(--text2);font-size:.85rem;margin-bottom:28px;font-family:'JetBrains Mono',monospace}
  .go-acts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .go-btn{padding:12px;border-radius:var(--radius2);border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Syne',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:var(--tr)}
  .go-btn:hover{background:var(--bg2);border-color:var(--border2)}
  .go-btn.pri{background:linear-gradient(135deg,var(--x-color),var(--accent));border-color:transparent;color:#fff;box-shadow:0 4px 16px rgba(167,139,250,.3)}
  .go-btn.pri:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(167,139,250,.4)}

  /* ── HISTORY ── */
  .hist{margin-top:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .ht{font-size:.7rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-bottom:10px}
  .hr{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:.78rem}
  .hr:last-child{border-bottom:none}
  .hm{color:var(--text2);font-family:'JetBrains Mono',monospace;font-size:.68rem}
  .hres{font-weight:700}
  .hres.rx{color:var(--x-color)}.hres.ro{color:var(--o-color)}.hres.rd{color:var(--text2)}

  /* ── THINKING ── */
  .td span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin:0 2px;animation:tb 1.2s ease-in-out infinite}
  .td span:nth-child(2){animation-delay:.2s}.td span:nth-child(3){animation-delay:.4s}
  @keyframes tb{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

  @media(max-width:500px){.mode-grid{grid-template-columns:1fr 1fr 1fr}.name-inputs{grid-template-columns:1fr}.ult-board{gap:5px;padding:7px}.mini-grid{gap:1.5px}}
  @media(max-width:360px){.mode-grid{grid-template-columns:1fr 1fr}}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">TicTac</div>
    <div class="header-actions">
      <button class="icon-btn" id="themeBtn">🌙</button>
      <button class="icon-btn" id="soundBtn">🔊</button>
    </div>
  </header>
  <div id="sc"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════
const S = {
  darkMode:true, soundOn:true,
  scores:{x:0,o:0,draws:0}, history:[],
  screen:'menu',
  gameMode:'classic',    // classic | ultimate | memory
  playerMode:'two',      // single | two
  difficulty:'medium',
  playerNames:{x:'Player X',o:'Player O'},

  // Classic
  cBoard:Array(9).fill(null), cCur:'x', cStat:'playing',
  cWinner:null, cWinLine:[], cDeadCells:[],

  // Ultimate (all boards always open)
  uBoards:Array(9).fill(null).map(()=>Array(9).fill(null)),
  uBoardWin:Array(9).fill(null),
  uCur:'x', uStat:'playing', uWinner:null, uWinLine:[],

  // Memory
  mBoard:Array(9).fill(null), mCur:'x', mStat:'playing',
  mWinner:null, mWinLine:[],
  mQueue:[],    // [{player,idx}] ordered by placement time
  mFading:-1,   // index currently fading (-1=none)

  aiThinking:false,
};

const MAX_MARKS = 3; // max marks per player on board at once

// ══════════════════════════════════════════════════════
//  PERSISTENCE
// ══════════════════════════════════════════════════════
function save() {
  const keys=['darkMode','soundOn','scores','history','screen','gameMode','playerMode','difficulty','playerNames',
    'cBoard','cCur','cStat','cWinner','cWinLine','cDeadCells',
    'uBoards','uBoardWin','uCur','uStat','uWinner','uWinLine',
    'mBoard','mCur','mStat','mWinner','mWinLine','mQueue','mFading'];
  const obj={};keys.forEach(k=>obj[k]=S[k]);
  try{localStorage.setItem('tt3',JSON.stringify(obj));}catch(e){}
}
function load() {
  try{const r=localStorage.getItem('tt3');if(r)Object.assign(S,JSON.parse(r));}catch(e){}
}

// ══════════════════════════════════════════════════════
//  AUDIO
// ══════════════════════════════════════════════════════
const Sfx=(() => {
  const ctx=window.AudioContext?new AudioContext():null;
  return {play(type){
    if(!S.soundOn||!ctx)return;
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);const t=ctx.currentTime;
    if(type==='move'){
      o.frequency.setValueAtTime(440,t);o.frequency.exponentialRampToValueAtTime(660,t+.08);
      g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);
      o.start(t);o.stop(t+.12);
    }else if(type==='vanish'){
      o.type='sine';o.frequency.setValueAtTime(320,t);o.frequency.linearRampToValueAtTime(80,t+.35);
      g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);
      o.start(t);o.stop(t+.35);
    }else if(type==='win'){
      o.type='triangle';[261,329,392,523].forEach((f,i)=>o.frequency.setValueAtTime(f,t+i*.1));
      g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.5);
      o.start(t);o.stop(t+.5);
    }else if(type==='draw'){
      o.type='sawtooth';o.frequency.setValueAtTime(300,t);o.frequency.linearRampToValueAtTime(200,t+.3);
      g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.3);
      o.start(t);o.stop(t+.3);
    }
  }};
})();

// ══════════════════════════════════════════════════════
//  GAME LOGIC
// ══════════════════════════════════════════════════════
const WLINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function checkWin(board) {
  for(const [a,b,c] of WLINES)
    if(board[a]&&board[a]===board[b]&&board[a]===board[c])
      return{winner:board[a],line:[a,b,c]};
  return null;
}
function full(board){return board.every(c=>c!==null)}
function avail(board){return board.reduce((a,c,i)=>c===null?[...a,i]:a,[])}

/**
 * Dead-draw detection for Classic mode.
 * A win-line is "alive" if it doesn't already contain BOTH x and o.
 * If no alive lines remain, neither player can ever win → forced draw.
 */
function deadDrawCheck(board){
  const alive=WLINES.filter(([a,b,c])=>{
    const v=[board[a],board[b],board[c]];
    return!(v.includes('x')&&v.includes('o'));
  });
  if(alive.length===0) return{isDead:true,deadCells:[0,1,2,3,4,5,6,7,8]};
  const aliveSet=new Set(alive.flat());
  const dead=Array.from({length:9},(_,i)=>i).filter(i=>board[i]!==null&&!aliveSet.has(i));
  return{isDead:false,deadCells:dead};
}

// Minimax for Classic/Memory AI
function minimax(board,depth,isMax,alpha,beta){
  const w=checkWin(board);
  if(w)return w.winner==='o'?10-depth:depth-10;
  if(full(board))return 0;
  if(depth>=7)return 0;
  const moves=avail(board);
  if(isMax){
    let best=-Infinity;
    for(const m of moves){board[m]='o';best=Math.max(best,minimax(board,depth+1,false,alpha,beta));board[m]=null;alpha=Math.max(alpha,best);if(beta<=alpha)break;}
    return best;
  }else{
    let best=Infinity;
    for(const m of moves){board[m]='x';best=Math.min(best,minimax(board,depth+1,true,alpha,beta));board[m]=null;beta=Math.min(beta,best);if(beta<=alpha)break;}
    return best;
  }
}
function aiMove(board,diff){
  const moves=avail(board);if(!moves.length)return-1;
  if(diff==='easy')return moves[Math.floor(Math.random()*moves.length)];
  for(const m of moves){board[m]='o';if(checkWin(board)){board[m]=null;return m;}board[m]=null;}
  for(const m of moves){board[m]='x';if(checkWin(board)){board[m]=null;return m;}board[m]=null;}
  if(diff==='medium'){
    if(board[4]===null)return 4;
    const c=[0,2,6,8].filter(i=>board[i]===null);if(c.length)return c[Math.floor(Math.random()*c.length)];
    return moves[Math.floor(Math.random()*moves.length)];
  }
  let best=-Infinity,bm=moves[0];
  for(const m of moves){board[m]='o';const sc=minimax(board,0,false,-Infinity,Infinity);board[m]=null;if(sc>best){best=sc;bm=m;}}
  return bm;
}

  c.innerHTML=S.screen==='menu'?renderMenu():renderGame();
  c.addEventListener('click',handleAction);
  save();
}

const sym=s=>s==='x'?'✕':'○';
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function renderGame(){
  const xN=S.playerNames.x, oN=S.playerMode==='single'?`AI (${S.difficulty})`:S.playerNames.o;
  const isCl=S.gameMode==='classic', isUl=S.gameMode==='ultimate', isMm=S.gameMode==='memory';
  const stat=isCl?S.cStat:isUl?S.uStat:S.mStat;
  const winner=isCl?S.cWinner:isUl?S.uWinner:S.mWinner;
  const cur=isCl?S.cCur:isUl?S.uCur:S.mCur;
  let stxt='',scls='';
  if(S.aiThinking){stxt=`🤖 ${esc(oN)} is thinking <span class="td"><span></span><span></span><span></span></span>`;scls='thinking';}
  else if(stat==='win'){stxt=`🏆 ${esc(winner==='x'?xN:oN)} wins!`;scls='win';}
  else if(stat==='draw'){stxt=isMm?`🤝 It's a draw!`:`🤝 Draw — no winning path remains!`;scls='draw';}
  else{stxt=`${sym(cur)} ${esc(cur==='x'?xN:oN)}'s turn`;}
  const mLabel=isCl?'🎯 Classic':isUl?'🧠 Ultimate':'👁️ Memory';

  return`<div class="screen">
    <div class="game-header">
      <button class="back-btn" data-a="goMenu">← Menu</button>
      <div class="game-title">${mLabel} · ${S.playerMode==='single'?`vs AI (${S.difficulty})`:'2 Players'}</div>
      <button class="restart-btn" data-a="restart">↺ Restart</button>
    </div>
    <div class="score-bar">
      <div class="ps xs${cur==='x'&&stat==='playing'?' ax':''}">
        <div class="pn">${esc(xN)}</div><div class="pp">✕</div><div class="pw">${S.scores.x} wins</div>
      </div>
      <div class="sdiv"></div>
      <div class="smid"><div class="sc">${S.scores.x} · ${S.scores.o}</div><div class="sl">Draws: ${S.scores.draws}</div></div>
      <div class="sdiv"></div>
      <div class="ps os${cur==='o'&&stat==='playing'?' ao':''}">
        <div class="pn">${esc(oN)}</div><div class="pp">○</div><div class="pw">${S.scores.o} wins</div>
      </div>
    </div>
    <div class="status ${scls}">${stxt}</div>
    ${isCl?renderClassic():isUl?renderUlt():renderMem()}

}

function renderClassic(){
  const b=S.cBoard,wl=S.cWinLine,dc=S.cDeadCells||[],stat=S.cStat;
  return`<div class="classic-board">${b.map((c,i)=>{
    let cls='cell';
    if(c){cls+=` taken c${c}`;}
    if(wl.includes(i))cls+=' cw';
    else if(dc.includes(i)&&c)cls+=' cdead';
    if(stat!=='playing'||S.aiThinking)cls+=' dis';
    return`<div class="${cls}" data-a="cc" data-i="${i}">${c?sym(c):''}</div>`;
  }).join('')}</div>`;
}

function renderUlt(){
  const stat=S.uStat;
  return`<div class="ult-wrap"><div class="ult-board">${S.uBoards.map((board,bi)=>{
    const bw=S.uBoardWin[bi];
    let bc='mini-board';
    if(bw==='x')bc+=' wx';else if(bw==='o')bc+=' wo';else if(bw==='draw')bc+=' wd';
    return`<div class="${bc}">
      ${bw?`<div class="bwo ${bw==='x'?'bx':bw==='o'?'bo':'bd'}">${bw==='draw'?'—':sym(bw)}</div>`:''}
      <div class="mini-grid">${board.map((c,ci)=>{
        let cls='mc';
        if(c)cls+=` taken c${c}`;
        const ok=!bw&&!c&&stat==='playing'&&!S.aiThinking;
        if(!ok&&!c)cls+=' dis';
        return`<div class="${cls}" data-a="uc" data-b="${bi}" data-c="${ci}">${c?sym(c):''}</div>`;
      }).join('')}</div>
    </div>`;
  }).join('')}</div></div>`;
}

function renderMem(){
  const b=S.mBoard,wl=S.mWinLine,stat=S.mStat,fading=S.mFading;
  const cur=S.mCur;
  const xm=S.mQueue.filter(m=>m.player==='x');
  const om=S.mQueue.filter(m=>m.player==='o');
  // Ghost: if current player has MAX_MARKS, their next move will remove their oldest
  const curMarks=S.mQueue.filter(m=>m.player===cur);
  const ghostIdx=curMarks.length>=MAX_MARKS?curMarks[0].idx:-1;

  return`
  <div class="mem-info">
    <span><span class="dot xd"></span>✕ ${xm.length}/${MAX_MARKS} marks</span>
    <span><span class="dot od"></span>○ ${om.length}/${MAX_MARKS} marks</span>
  </div>
  ${ghostIdx>=0&&stat==='playing'?`<div class="mem-warn">⚠️ ${sym(cur)}'s oldest mark (pos ${ghostIdx+1}) vanishes on next move</div>`:''}
  <div class="mem-board">${b.map((c,i)=>{
    let cls='mcell';
    if(c)cls+=` taken c${c}`;
    if(wl.includes(i))cls+=' cw';
    if(i===fading)cls+=' fading';
    if(i===ghostIdx&&stat==='playing'&&!wl.length)cls+=` ghost c${cur}`;
    const canClick=!c&&stat==='playing'&&!S.aiThinking&&fading===-1;
    if(!canClick&&!c)cls+=' dis';
    return`<div class="${cls}" data-a="mc" data-i="${i}">${c?sym(c):''}</div>`;
  }).join('')}</div>`;
}

function showGameOver(){
  const isCl=S.gameMode==='classic',isUl=S.gameMode==='ultimate',isMm=S.gameMode==='memory';
  const stat=isCl?S.cStat:isUl?S.uStat:S.mStat;
  const winner=isCl?S.cWinner:isUl?S.uWinner:S.mWinner;
  const xN=S.playerNames.x,oN=S.playerMode==='single'?`AI (${S.difficulty})`:S.playerNames.o;
  let icon,res,sub;
  if(stat==='win'){
    icon=winner==='x'?'🏆':(S.playerMode==='single'?'🤖':'🏆');
    res=`${esc(winner==='x'?xN:oN)} Wins!`;sub=`${sym(winner)} claimed victory`;Sfx.play('win');
  }else{
    icon='🤝';res="It's a Draw!";
    sub=isMm?'No winner this round':'No winning paths remain';Sfx.play('draw');
  }
  const ov=document.createElement('div');
  ov.className='go-ov';ov.id='gov';
  ov.innerHTML=`<div class="go-card"><span class="go-icon">${icon}</span><div class="go-res">${res}</div><div class="go-sub">${sub}</div>
    <div class="go-acts">
      <button class="go-btn" data-a="goMenu">← Menu</button>
      <button class="go-btn pri" data-a="restart">Play Again ↺</button>
    </div></div>`;
  document.getElementById('app').appendChild(ov);
  ov.addEventListener('click',handleAction);
}

document.getElementById('themeBtn').addEventListener('click',()=>{S.darkMode=!S.darkMode;render();});
document.getElementById('soundBtn').addEventListener('click',()=>{S.soundOn=!S.soundOn;render();});

function handleAction(e){
  const el=e.target.closest('[data-a]');if(!el)return;
  const {a,v,i,b,c}=el.dataset;
  if(a==='setGM'){S.gameMode=v;render();}
  else if(a==='setPM'){S.playerMode=v;render();}
  else if(a==='setD'){S.difficulty=v;render();}
  else if(a==='start')startGame();
  else if(a==='goMenu')goMenu();
  else if(a==='restart')restartGame();
  else if(a==='cc'&&!S.aiThinking)classicClick(+i);
  else if(a==='uc'&&!S.aiThinking)ultClick(+b,+c);
  else if(a==='mc'&&!S.aiThinking&&S.mFading===-1)memClick(+i);
}

function startGame(){
  if(S.playerMode==='two'){
    const nx=document.getElementById('nx'),no=document.getElementById('no');
    if(nx)S.playerNames.x=nx.value.trim()||'Player X';
    if(no)S.playerNames.o=no.value.trim()||'Player O';
  }else{S.playerNames.x='You';S.playerNames.o='AI';}
  resetGame();S.screen='game';render();
}
function goMenu(){const ov=document.getElementById('gov');if(ov)ov.remove();S.screen='menu';render();}
function restartGame(){const ov=document.getElementById('gov');if(ov)ov.remove();resetGame();render();}
function resetGame(){
  S.cBoard=Array(9).fill(null);S.cCur='x';S.cStat='playing';S.cWinner=null;S.cWinLine=[];S.cDeadCells=[];
  S.uBoards=Array(9).fill(null).map(()=>Array(9).fill(null));S.uBoardWin=Array(9).fill(null);
  S.uCur='x';S.uStat='playing';S.uWinner=null;S.uWinLine=[];
  S.mBoard=Array(9).fill(null);S.mCur='x';S.mStat='playing';S.mWinner=null;S.mWinLine=[];
  S.mQueue=[];S.mFading=-1;S.aiThinking=false;
}

// ══════════════════════════════════════════════════════
//  CLASSIC
// ══════════════════════════════════════════════════════
function classicClick(idx){
  if(S.cStat!=='playing'||S.cBoard[idx])return;
  if(S.playerMode==='single'&&S.cCur==='o')return;
  doClassic(idx);
  if(S.playerMode==='single'&&S.cStat==='playing')triggerAI();
}
function doClassic(idx){
  S.cBoard[idx]=S.cCur;Sfx.play('move');
  setTimeout(()=>{const el=document.querySelector(`[data-a="cc"][data-i="${idx}"]`);if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),400);}},10);
  const w=checkWin(S.cBoard);
  if(w){S.cStat='win';S.cWinner=w.winner;S.cWinLine=w.line;upScore(w.winner);addHist(w.winner);render();setTimeout(showGameOver,600);}
  else if(full(S.cBoard)){S.cStat='draw';S.scores.draws++;addHist('draw');render();setTimeout(showGameOver,600);}
  else{
    // Dead-draw: check if any winning path still exists
    const{isDead,deadCells}=deadDrawCheck(S.cBoard);
    S.cDeadCells=deadCells;
    if(isDead){S.cStat='draw';S.scores.draws++;addHist('draw');render();setTimeout(showGameOver,700);}
    else{S.cCur=S.cCur==='x'?'o':'x';render();}
  }
}
function triggerAI(){
  S.aiThinking=true;render();
  const delay=S.difficulty==='hard'?600:S.difficulty==='medium'?400:250;
  setTimeout(()=>{const m=aiMove([...S.cBoard],S.difficulty);S.aiThinking=false;if(m>=0)doClassic(m);else render();},delay);
}

// ══════════════════════════════════════════════════════
//  ULTIMATE — all boards always open
// ══════════════════════════════════════════════════════
function ultClick(bi,ci){
  if(S.uStat!=='playing'||S.uBoardWin[bi]||S.uBoards[bi][ci])return;
  if(S.playerMode==='single'&&S.uCur==='o')return;
  doUlt(bi,ci);
  if(S.playerMode==='single'&&S.uStat==='playing')triggerUltAI();
}
function doUlt(bi,ci){
  S.uBoards[bi][ci]=S.uCur;Sfx.play('move');
  setTimeout(()=>{const el=document.querySelector(`[data-a="uc"][data-b="${bi}"][data-c="${ci}"]`);if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),300);}},10);
  const bw=checkWin(S.uBoards[bi]);
  if(bw)S.uBoardWin[bi]=bw.winner;
  else if(full(S.uBoards[bi]))S.uBoardWin[bi]='draw';
  const gw=checkWin(S.uBoardWin.map(w=>w==='draw'?null:w));
  if(gw){S.uStat='win';S.uWinner=gw.winner;S.uWinLine=gw.line;upScore(gw.winner);addHist(gw.winner);render();setTimeout(showGameOver,700);return;}
  if(S.uBoardWin.every(w=>w!==null)){S.uStat='draw';S.scores.draws++;addHist('draw');render();setTimeout(showGameOver,700);return;}
  S.uCur=S.uCur==='x'?'o':'x';render();
}
function triggerUltAI(){
  S.aiThinking=true;render();
  const delay=S.difficulty==='hard'?700:400;
  setTimeout(()=>{
    S.aiThinking=false;
    const openBoards=Array.from({length:9},(_,i)=>i).filter(i=>!S.uBoardWin[i]);
    if(!openBoards.length){render();return;}
    let bi,ci;
    if(S.difficulty==='hard'){
      const macro=S.uBoardWin.map(w=>w==='draw'?null:w);
      let found=false;
      // Win a board to complete macro line
      for(const b of openBoards){
        const ms=avail(S.uBoards[b]);
        for(const m of ms){
          S.uBoards[b][m]='o';const bw=checkWin(S.uBoards[b]);
          if(bw){const tm=[...macro];tm[b]='o';if(checkWin(tm)){S.uBoards[b][m]=null;bi=b;ci=m;found=true;break;}}
          S.uBoards[b][m]=null;
        }if(found)break;
      }
      // Block opponent from winning macro line
      if(!found)for(const b of openBoards){
        const ms=avail(S.uBoards[b]);
        for(const m of ms){
          S.uBoards[b][m]='x';const bw=checkWin(S.uBoards[b]);
          if(bw){const tm=[...macro];tm[b]='x';if(checkWin(tm)){S.uBoards[b][m]=null;bi=b;ci=m;found=true;break;}}
          S.uBoards[b][m]=null;
        }if(found)break;
      }
      // Win any board
      if(!found)for(const b of openBoards){
        const m2=aiMove([...S.uBoards[b]],'hard');
        if(m2>=0){S.uBoards[b][m2]='o';if(checkWin(S.uBoards[b])){S.uBoards[b][m2]=null;bi=b;ci=m2;found=true;break;}S.uBoards[b][m2]=null;}
      }
      // Prefer center/corners macro positions
      if(!found){
        bi=[4,0,2,6,8,1,3,5,7].find(i=>openBoards.includes(i));
        ci=aiMove([...S.uBoards[bi]],'medium');
      }
    }else{
      bi=openBoards[Math.floor(Math.random()*openBoards.length)];
      const ms=avail(S.uBoards[bi]);ci=ms[Math.floor(Math.random()*ms.length)];
    }
    doUlt(bi,ci);
  },delay);
}

// ══════════════════════════════════════════════════════
//  MEMORY TIC TAC TOE
// ══════════════════════════════════════════════════════
/**
 * Rules:
 * - Each player holds at most MAX_MARKS (3) marks simultaneously.
 * - Placing a 4th mark triggers fade-out of that player's OLDEST mark,
 *   then places the new mark. The vanishing mark cannot form the winning line.
 * - Win is evaluated AFTER both removal and placement.
 * - Board fills with no winner → draw.
 */
function memClick(idx){
  if(S.mStat!=='playing'||S.mBoard[idx]||S.mFading!==-1)return;
  if(S.playerMode==='single'&&S.mCur==='o')return;
  doMem(idx);
}
function doMem(idx){
  const player=S.mCur;
  const playerMarks=S.mQueue.filter(m=>m.player===player);
  if(playerMarks.length>=MAX_MARKS){
    const oldest=playerMarks[0];
    S.mFading=oldest.idx;Sfx.play('vanish');render();
    setTimeout(()=>{
      S.mBoard[oldest.idx]=null;
      S.mQueue=S.mQueue.filter(m=>!(m.player===player&&m.idx===oldest.idx));
      S.mFading=-1;
      placeMem(player,idx);
    },680);
  }else{
    placeMem(player,idx);
  }
}
function placeMem(player,idx){
  S.mBoard[idx]=player;S.mQueue.push({player,idx});Sfx.play('move');
  setTimeout(()=>{const el=document.querySelector(`[data-a="mc"][data-i="${idx}"]`);if(el){el.classList.add('pop');setTimeout(()=>el.classList.remove('pop'),400);}},10);
  const w=checkWin(S.mBoard);
  if(w){S.mStat='win';S.mWinner=w.winner;S.mWinLine=w.line;upScore(w.winner);addHist(w.winner);render();setTimeout(showGameOver,600);}
  else if(full(S.mBoard)){S.mStat='draw';S.scores.draws++;addHist('draw');render();setTimeout(showGameOver,600);}
  else{
    S.mCur=player==='x'?'o':'x';render();
    if(S.playerMode==='single'&&S.mCur==='o'&&S.mStat==='playing')triggerMemAI();
  }
}
function triggerMemAI(){
  S.aiThinking=true;render();
  setTimeout(()=>{S.aiThinking=false;const m=memAIMove();if(m>=0)doMem(m);else render();},S.difficulty==='hard'?600:400);
}
function memAIMove(){
  const av=avail(S.mBoard);if(!av.length)return-1;
  if(S.difficulty==='easy')return av[Math.floor(Math.random()*av.length)];
  const me='o',opp='x';
  const myMarks=S.mQueue.filter(m=>m.player===me);
  const vanish=myMarks.length>=MAX_MARKS?myMarks[0].idx:-1;
  function sim(idx){const b=[...S.mBoard];if(vanish>=0)b[vanish]=null;b[idx]=me;return b;}
  // Win
  for(const m of av){if(checkWin(sim(m)))return m;}
  // Block
  const oppM=S.mQueue.filter(m=>m.player===opp);
  const ov2=oppM.length>=MAX_MARKS?oppM[0].idx:-1;
  for(const m of av){const b=[...S.mBoard];if(ov2>=0)b[ov2]=null;b[m]=opp;if(checkWin(b))return m;}
  // Center/corners
  if(S.mBoard[4]===null)return 4;
  const corners=[0,2,6,8].filter(i=>S.mBoard[i]===null);
  if(corners.length)return corners[Math.floor(Math.random()*corners.length)];
  return av[Math.floor(Math.random()*av.length)];
}

// ══════════════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════════════
function upScore(w){if(w==='x')S.scores.x++;else if(w==='o')S.scores.o++;}
function addHist(r){
  S.history.push({gameMode:S.gameMode,diff:S.playerMode==='single'?S.difficulty:null,xName:S.playerNames.x,oName:S.playerNames.o,r,mode:S.gameMode,ts:Date.now()});
  if(S.history.length>20)S.history=S.history.slice(-20);
}

// ══════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════
load();
S.aiThinking=false;S.mFading=-1;
if(S.screen==='game'&&S.playerMode==='single'){
  const isCl=S.gameMode==='classic',isUl=S.gameMode==='ultimate';
  const cur=isCl?S.cCur:isUl?S.uCur:S.mCur;
  const sta=isCl?S.cStat:isUl?S.uStat:S.mStat;
  if(cur==='o'&&sta==='playing'){render();if(isCl)triggerAI();else if(isUl)triggerUltAI();else triggerMemAI();}
  else render();
}else render();
</script>
